<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0F1B2D; --teal:#00A88C; --text-1:#1a1a2e; --text-2:#4A5568; --text-3:#718096;
  --border:#E2E8F0; --sans:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#fff;color:var(--text-1);font-size:13.5px;line-height:1.6;max-width:820px;margin:0 auto;padding:36px 40px}
.screen-only{background:#f0f4f8;padding:10px 16px;border-radius:6px;margin-bottom:20px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.screen-only button{background:var(--navy);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans)}
.screen-only button:hover{background:#243B55}

/* Header */
.r-name{font-size:28px;font-weight:600;color:var(--navy);letter-spacing:-.02em}
.r-title{font-size:15px;color:var(--teal);font-weight:500;margin-top:4px}
.r-contact{display:flex;flex-wrap:wrap;gap:4px 18px;margin-top:10px;font-size:12px;color:var(--text-3)}
.r-contact a{color:var(--teal);text-decoration:none}
.r-divider{border:none;border-top:2px solid var(--navy);margin:14px 0 4px}

/* Section */
.r-section{margin-top:18px}
.r-section-title{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:10px}

/* Summary */
.r-summary{font-size:13px;color:var(--text-2);line-height:1.7}

/* Skills table */
.r-skills{display:grid;grid-template-columns:1fr;gap:4px}
.r-skill-row{display:flex;gap:6px;font-size:12.5px}
.r-skill-cat{font-weight:600;color:var(--navy);min-width:180px;flex-shrink:0}
.r-skill-val{color:var(--text-2)}

/* Job */
.r-job{margin-bottom:14px}
.r-job-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px}
.r-job-role{font-size:14px;font-weight:600;color:var(--navy)}
.r-job-date{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.r-job-company{font-size:12.5px;color:var(--teal);margin:2px 0}
.r-job-project{font-size:12px;color:var(--text-3);font-style:italic;margin-bottom:6px}
.r-bullets{list-style:none;padding:0}
.r-bullets li{font-size:12.5px;color:var(--text-2);padding-left:14px;position:relative;margin-bottom:4px;line-height:1.55}
.r-bullets li::before{content:"•";position:absolute;left:0;color:var(--teal)}

/* Projects */
.r-project{margin-bottom:8px}
.r-project-title{font-weight:600;font-size:13px;color:var(--navy)}
.r-project-desc{font-size:12.5px;color:var(--text-2);margin-top:2px}

/* Cert / Education */
.r-cert{font-size:12.5px;padding-left:14px;position:relative;margin-bottom:4px}
.r-cert::before{content:"•";position:absolute;left:0;color:var(--teal)}
.r-cert-bold{font-weight:600;color:var(--navy)}

/* Achievements */
.r-achieve{padding-left:14px;position:relative;margin-bottom:6px}
.r-achieve::before{content:"▸";position:absolute;left:0;color:var(--teal);font-size:10px;top:2px}
.r-achieve-title{font-weight:600;font-size:13px;color:var(--navy)}
.r-achieve-desc{font-size:12.5px;color:var(--text-2);margin-top:2px}

@media print{
  body{padding:20px 24px}
  .screen-only{display:none!important}
  @page{margin:14mm 16mm;size:letter}
}
</style>
</head>
<body>

<div class="screen-only" id="screen-bar">
  <span>Resume page — reads from <code>content/resume-data.json</code></span>
  <button onclick="window.print()">Print / Save as PDF</button>
</div>

<div id="resume-content">Loading…</div>

<script>
async function loadData() {
  try {
    const r = await fetch('./content/resume-data.json');
    if (r.ok) return r.json();
  } catch(_) {}
  return null;
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function render() {
  const d = await loadData();
  if (!d) { document.getElementById("resume-content").textContent = "Error: could not load resume-data.json"; return; }

  const p = d.profile;
  document.title = p.name + " — Resume";

  let html = `
  <div style="margin-bottom:6px">
    <div class="r-name">${esc(p.name)}</div>
    <div class="r-title">${esc(p.title)}</div>
    <div class="r-contact">
      <span>${esc(p.location)}</span>
      <span>${esc(p.phone)}</span>
      <span><a href="mailto:${esc(p.email)}">${esc(p.email)}</a></span>
      <span><a href="${esc(p.linkedin)}" target="_blank">LinkedIn</a></span>
      <span><a href="${esc(p.github)}" target="_blank">GitHub</a></span>
    </div>
  </div>
  <hr class="r-divider"/>

  <div class="r-section">
    <div class="r-section-title">Professional Summary</div>
    <p class="r-summary">${esc(d.summary)}</p>
  </div>

  <div class="r-section">
    <div class="r-section-title">Technical Skills</div>
    <div class="r-skills">
      ${d.skills.map(s => `<div class="r-skill-row"><span class="r-skill-cat">${esc(s.category)}</span><span class="r-skill-val">${s.items.map(esc).join(", ")}</span></div>`).join("")}
    </div>
  </div>

  <div class="r-section">
    <div class="r-section-title">Professional Experience</div>
    ${d.experience.map(job => `
    <div class="r-job">
      <div class="r-job-header">
        <span class="r-job-role">${esc(job.role)}</span>
        <span class="r-job-date">${esc(job.startDate)} – ${esc(job.endDate)}${job.type === "Contract" ? " (Contract)" : ""}</span>
      </div>
      <div class="r-job-company">${esc(job.company)} · ${esc(job.location)}</div>
      <div class="r-job-project">${esc(job.project)}</div>
      <ul class="r-bullets">${job.bullets.map(b => `<li>${esc(b)}</li>`).join("")}</ul>
    </div>`).join("")}
  </div>

  <div class="r-section">
    <div class="r-section-title">Key Projects</div>
    ${d.projects.map(pr => `
    <div class="r-project">
      <span class="r-project-title">${esc(pr.title)} (${esc(pr.company)}, ${esc(pr.year)}): </span>
      <span class="r-project-desc">${esc(pr.description)} Tech: ${pr.tech.join(", ")}.</span>
    </div>`).join("")}
  </div>

  <div class="r-section">
    <div class="r-section-title">Certifications</div>
    ${d.certifications.map(c => `<div class="r-cert"><span class="r-cert-bold">${esc(c.title)}</span> — ${esc(c.issuer)}${c.year ? " (" + esc(c.year) + ")" : ""}</div>`).join("")}
  </div>

  <div class="r-section">
    <div class="r-section-title">Education</div>
    ${d.education.map(e => `
    <div class="r-cert">
      <span class="r-cert-bold">${esc(e.degree)}</span> — ${esc(e.institution)} (${esc(e.year)})
      ${e.note ? `<div style="font-size:12px;color:#718096;margin-top:2px;font-style:italic">${esc(e.note)}</div>` : ""}
    </div>`).join("")}
  </div>

  <div class="r-section">
    <div class="r-section-title">Achievements</div>
    ${d.achievements.map(a => `
    <div class="r-achieve">
      <div class="r-achieve-title">${esc(a.title)} (${esc(a.year)})</div>
      <div class="r-achieve-desc">${esc(a.description)}</div>
    </div>`).join("")}
  </div>
  `;

  document.getElementById("resume-content").innerHTML = html;
}
render();
</script>
</body>
</html>
